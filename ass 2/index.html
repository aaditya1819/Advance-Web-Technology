<!DOCTYPE html>
<html lang="en" ng-app="registrationApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form Validation</title>
    <!-- AngularJS Library (1.x) -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="RegistrationController">

    <div class="container">
        <h2>User Registration</h2>
        
        <!-- Registration Form -->
        <!-- 'novalidate' disables browser's default HTML validation so AngularJS can handle it natively -->
        <form name="regForm" ng-submit="submitForm(regForm.$valid)" novalidate>
            
            <!-- Full Name Field -->
            <div class="form-group">
                <label>Full Name:</label>
                <!-- ng-model binds the input to the user.fullName variable -->
                <!-- required makes this field mandatory -->
                <input type="text" name="fullName" ng-model="user.fullName"
                       ng-class="{'error-input': regForm.fullName.$invalid && regForm.fullName.$dirty}" 
                       required placeholder="Enter your full name">
                
                <!-- Error messages for Full Name -->
                <!-- ng-show displays the span only if the matching condition is true -->
                <div class="error-msg" ng-show="regForm.fullName.$invalid && regForm.fullName.$dirty">
                    <span ng-show="regForm.fullName.$error.required">Full Name is required.</span>
                </div>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label>Email Address:</label>
                <!-- type="email" automatically triggers email format validation in AngularJS -->
                <input type="email" name="email" ng-model="user.email"
                       ng-class="{'error-input': regForm.email.$invalid && regForm.email.$dirty}" 
                       required placeholder="Enter your email">
                
                <div class="error-msg" ng-show="regForm.email.$invalid && regForm.email.$dirty">
                    <span ng-show="regForm.email.$error.required">Email is required.</span>
                    <span ng-show="regForm.email.$error.email">Invalid email format.</span>
                </div>
            </div>

            <!-- Phone Number Field -->
            <div class="form-group">
                <label>Phone Number:</label>
                <!-- ng-pattern ensures the input matches the Regex for exactly 10 digits -->
                <input type="text" name="phone" ng-model="user.phone" 
                       ng-pattern="/^\d{10}$/"
                       ng-class="{'error-input': regForm.phone.$invalid && regForm.phone.$dirty}" 
                       required placeholder="10-digit mobile number">
                
                <div class="error-msg" ng-show="regForm.phone.$invalid && regForm.phone.$dirty">
                    <span ng-show="regForm.phone.$error.required">Phone number is required.</span>
                    <!-- Triggered when ng-pattern fails -->
                    <span ng-show="regForm.phone.$error.pattern">Phone number must be exactly 10 digits.</span>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label>Password:</label>
                <!-- ng-minlength sets the minimum character length requirement to 6 -->
                <input type="password" name="password" ng-model="user.password" 
                       ng-minlength="6"
                       ng-class="{'error-input': regForm.password.$invalid && regForm.password.$dirty}" 
                       required placeholder="Minimum 6 characters">
                
                <div class="error-msg" ng-show="regForm.password.$invalid && regForm.password.$dirty">
                    <span ng-show="regForm.password.$error.required">Password is required.</span>
                    <span ng-show="regForm.password.$error.minlength">Password must be at least 6 characters long.</span>
                </div>
            </div>

            <!-- Submit Button -->
            <!-- ng-disabled disables the button styling & clicking if any part of the form is invalid -->
            <button type="submit" ng-disabled="regForm.$invalid" class="submit-btn">
                Register
            </button>
            
        </form>

        <!-- Success Message -->
        <!-- Shows only when isSubmitted is true (set from app.js) -->
        <div class="success-msg" ng-show="isSubmitted">
            Registration Successful! Welcome, {{ user.fullName }}.
        </div>

    </div>

    <!-- Application JavaScript -->
    <script src="app.js"></script>
</body>
</html>
