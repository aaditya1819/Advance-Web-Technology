<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Course Management System</h1>
            <p>Manage your courses easily via Node.js & MySQL</p>
        </header>

        <!-- Message Box for Success / Errors -->
        <div id="messageBox" class="message-box hidden"></div>

        <section class="form-section">
            <h2>Add / Edit Course</h2>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <input type="text" id="courseName" required placeholder="e.g. Advanced Web Technology">
                </div>
                <div class="form-group">
                    <label for="instructorName">Instructor Name</label>
                    <input type="text" id="instructorName" required placeholder="e.g. Professor Smith">
                </div>
                <div class="form-group">
                    <label for="duration">Duration</label>
                    <input type="text" id="duration" required placeholder="e.g. 6 Months">
                </div>
                <div class="form-group">
                    <label for="fees">Fees ($)</label>
                    <input type="number" id="fees" required placeholder="e.g. 299">
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn">Save Course</button>
                    <button type="button" id="cancelBtn" class="hidden" onclick="resetForm()">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <h2>Available Courses</h2>
            <div class="table-container">
                <table id="courseTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Course Name</th>
                            <th>Instructor</th>
                            <th>Duration</th>
                            <th>Fees</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody">
                        <!-- Course rows will be injected here via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
