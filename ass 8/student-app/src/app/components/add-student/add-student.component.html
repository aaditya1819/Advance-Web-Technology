<div class="card">
  <h2>Add New Student</h2>

  <div *ngIf="successMessage" class="alert success">
    {{ successMessage }}
  </div>

  <form #studentForm="ngForm" (ngSubmit)="onSubmit(studentForm)">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" 
             [(ngModel)]="newStudent.name" required #nameField="ngModel">
      <div *ngIf="nameField.invalid && nameField.touched" class="error-text">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" 
             [(ngModel)]="newStudent.age" required min="10" #ageField="ngModel">
      <div *ngIf="ageField.invalid && ageField.touched" class="error-text">
        Valid minimum age is required.
      </div>
    </div>

    <div class="form-group">
      <label for="course">Course:</label>
      <input type="text" id="course" name="course" 
             [(ngModel)]="newStudent.course" required #courseField="ngModel">
      <div *ngIf="courseField.invalid && courseField.touched" class="error-text">
        Course is required.
      </div>
    </div>

    <button type="submit" class="btn" [disabled]="studentForm.invalid">Add Student</button>
  </form>
</div>
